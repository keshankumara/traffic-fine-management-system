# ========================================
# Traffic Fine Management System
# Application Configuration - PostgreSQL
# ========================================

# --- Server ---
server.port=8080
server.servlet.context-path=/api

# --- DataSource (PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/traffic_fine_db
spring.datasource.username=traffic_db
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Security ---
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration-ms=86400000

# --- Logging ---
logging.level.com.srilanka.trafficfine=DEBUG
logging.level.org.springframework.security=INFO

# --- SpringDoc / Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# For local development using the in-memory H2 DB, start the application with:
#   -Dspring.profiles.active=dev
# or set the environment variable SPRING_PROFILES_ACTIVE=dev
